dev_mode: false

# Set to true to drop the catalog after setup (requires dev_mode: true)
resource_cleanup: false

# Set to true if this course uses the Medallion Lab pattern
medallion_lab: false

course_name: "Building Single Agent Applications on Databricks"
serverless_compute_version: "5"

catalog:
  prefix: "labuser"
  schema_name: "agent_training"

data:
  databricks_share_name: "databricks_airbnb_sample_data"
  table_name: "sf_airbnb_listings"
  vocareum_share_name: "airbnb"

python_tools:
  - est_listing_value
